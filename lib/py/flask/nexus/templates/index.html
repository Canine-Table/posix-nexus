<!DOCTYPE html>
<html lang="en" dir="ltr">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewpoint" content="width=device-width, initial-scale=1.0"/>
		<link rel="icon" type="image/png" crossorigin=anonymous href="https://github.com/Canine-Table/posix-nexus/blob/main/img/posix-nexus.png?raw=true"/>
		<title>Zero’s altar</title>
		<link rel="stylesheet" href="{{ url_for('nexus.static', filename='css/styles.css') }}"/>
	</head>
	<body>
		<header class="nx-header">
			<h1>At the Foot of the Void</h1>
		</header>
		<main class="nx-main">
			<form action="#zero" method="post">
				<fieldset class="nx-fieldset">
					<legend class="nx-legend">Submit to the Silence</legend>
						<button class="nx-button">Null</button>
				</fieldset>
			</form>
			<dialog class="nx-dialog-box" open>
				<div class="nx-dialog-title">
					hello
					<form method="dialog">
						<button class="nx-dialog-close"></button>
					</form>
				</div/>
				<div class="nx-dialog-body">
					once upon a time!!!
				</div>
				<div class="nx-dialog-actions">
					<button class="nx-button">Cancel</button>
					<button class="nx-button">Proceed</button>
				</div>
			</dialog>
		</main>
		<footer class="nx-footer">
			<div class="nx-spinner"></div>
			<button data-nx-tooltip>
				Hover me
				<div class="nx-tooltip">This is Zero’s whisper.</div>
			</button>
		</footer>
		<script type="module" src="{{ url_for('nexus.static', filename='mjs/script.mjs') }}"></script>
	</body>
</html>
